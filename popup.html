<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ChatGPT to Notion</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <h1>ChatGPT to Notion</h1>
      <p class="lead">Notion 토큰을 저장한 뒤, ChatGPT에서 복사하고 Notion에서 붙여넣으세요.</p>

      <label class="field">
        <span>Notion Integration Token</span>
        <input id="token" type="password" placeholder="secret_xxx 또는 ntn_xxx">
      </label>

      <section class="toggles">
        <label class="toggle-row">
          <span>
            <strong>ChatGPT 복사 버튼</strong>
            <small>ChatGPT 답변 옆의 `Copy for Notion` 버튼 표시</small>
          </span>
          <span class="toggle-switch">
            <input id="enable-copy-button" type="checkbox">
            <span class="toggle-slider" aria-hidden="true"></span>
          </span>
        </label>

        <label class="toggle-row">
          <span>
            <strong>Notion 붙여넣기 기능</strong>
            <small>Notion의 `Paste ChatGPT` 버튼과 붙여넣기 가로채기 활성화</small>
          </span>
          <span class="toggle-switch">
            <input id="enable-notion-paste" type="checkbox">
            <span class="toggle-slider" aria-hidden="true"></span>
          </span>
        </label>
      </section>

      <div class="actions">
        <button id="save" type="button">저장</button>
        <button id="test" type="button" class="secondary">연결 테스트</button>
      </div>

      <section class="status">
        <div id="token-status">토큰: 저장되지 않음</div>
        <div id="copy-status">최근 ChatGPT 캡처: 없음</div>
        <div id="connection-status">연결 상태: 미확인</div>
      </section>

      <section class="notes">
        <p>1. Notion Integration을 생성합니다.</p>
        <p>2. 대상 페이지를 해당 Integration과 공유합니다.</p>
        <p>3. ChatGPT에서 <strong>Copy for Notion</strong>을 누릅니다.</p>
        <p>4. Notion에서 붙여넣거나 <strong>Paste ChatGPT</strong>를 누릅니다.</p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
